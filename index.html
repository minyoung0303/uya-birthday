<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>유야 생일 축하해 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ocean-bg"></div>
<div class="stars" id="stars"></div>
<div class="bubbles" id="bubbles"></div>

<div class="container">
  <div class="hero">
    <span class="kirby-art">🌸</span>
    <h1 class="hero-name">이민정 (유야)</h1>
    <p class="hero-sub">생일 축하해요 ✨</p>
    <p class="hero-date">2026년 6월 19일</p>
  </div>

  <div class="kokomi-decoration">🐚 ✦ 🫧 ✦ 🌊 ✦ 🫧 ✦ 🐚</div>

  <div class="form-card">
    <h2>💌 축하 메시지 남기기</h2>

    <div class="field-group">
      <label class="field-label" for="senderName">이름 또는 닉네임</label>
      <input class="field-input" id="senderName" type="text" placeholder="예: 민지, 코코미팬, 🐠" maxlength="20">
    </div>

    <div class="field-group">
      <label class="field-label" for="msgText">메시지</label>
      <textarea class="field-input" id="msgText" rows="4" placeholder="유야에게 따뜻한 말을 남겨주세요 🌸" maxlength="300"></textarea>
      <div class="char-count" id="charCount">0 / 300</div>
    </div>

    <div class="field-group">
      <label class="field-label">함께 보낼 감정</label>
      <div class="emoji-row" id="emojiRow">
        <button class="emoji-btn" data-emoji="🎂">🎂</button>
        <button class="emoji-btn" data-emoji="🌸">🌸</button>
        <button class="emoji-btn" data-emoji="💜">💜</button>
        <button class="emoji-btn" data-emoji="🌊">🌊</button>
        <button class="emoji-btn" data-emoji="⭐">⭐</button>
        <button class="emoji-btn" data-emoji="🐚">🐚</button>
        <button class="emoji-btn" data-emoji="🎀">🎀</button>
        <button class="emoji-btn" data-emoji="🫧">🫧</button>
      </div>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitMessage()">메시지 보내기 ✉️</button>
    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="divider"><span>✦</span></div>

  <div class="messages-section">
    <h2>받은 축하 메시지</h2>
    <div id="messageList"><div class="loading">🫧 불러오는 중...</div></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = 'https://tihcuoxzbqxxqsvyljrl.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRpaGN1b3h6YnF4eHFzdnlsanJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE4MDk5MTIsImV4cCI6MjA5NzM4NTkxMn0.EIXPT939g_FNx5RLVJDhXxyubSvarrns7DBTIeyjlGo';
  const API = SUPABASE_URL + '/rest/v1/messages';
  const HEADERS = {
    'apikey': SUPABASE_KEY,
    'Authorization': 'Bearer ' + SUPABASE_KEY,
    'Content-Type': 'application/json',
    'Prefer': 'return=representation'
  };

  const LIKED_KEY = 'yuya_liked_ids';
  let likedIds = new Set();
  let selectedEmojis = [];

  function loadLiked() {
    try {
      const raw = localStorage.getItem(LIKED_KEY);
      if (raw) likedIds = new Set(JSON.parse(raw));
    } catch(e) {}
  }

  function saveLiked() {
    try { localStorage.setItem(LIKED_KEY, JSON.stringify([...likedIds])); } catch(e) {}
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }

  function showError(msg) {
    document.getElementById('errorMsg').textContent = msg;
    setTimeout(() => document.getElementById('errorMsg').textContent = '', 3000);
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  function getInitials(name) {
    if (!name) return '?';
    return name.trim().slice(0, 2).toUpperCase();
  }

  function timeSince(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const m = Math.floor(diff / 60000);
    if (m < 1) return '방금 전';
    if (m < 60) return m + '분 전';
    const h = Math.floor(m / 60);
    if (h < 24) return h + '시간 전';
    return Math.floor(h / 24) + '일 전';
  }

  async function fetchMessages() {
    try {
      const res = await fetch(API + '?order=created_at.desc&limit=100', {
        headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY }
      });
      if (!res.ok) throw new Error('fetch error');
      return await res.json();
    } catch(e) {
      return null;
    }
  }

  function renderMessages(messages) {
    const list = document.getElementById('messageList');
    if (!messages) {
      list.innerHTML = '<div class="empty-state">🌊 메시지를 불러오지 못했어요<br>잠시 후 다시 시도해주세요</div>';
      return;
    }
    if (messages.length === 0) {
      list.innerHTML = '<div class="empty-state">🌸 아직 메시지가 없어요<br>첫 번째 축하를 남겨주세요!</div>';
      return;
    }
    list.innerHTML = messages.map(m => {
      const liked = likedIds.has(m.id);
      const emojisArr = Array.isArray(m.emojis) ? m.emojis : [];
      return `<div class="msg-card">
        <div class="msg-header">
          <div class="msg-from">
            <div class="msg-avatar">${getInitials(m.name)}</div>
            <span class="msg-name">${escHtml(m.name || '익명')}</span>
          </div>
          <span class="msg-time">${timeSince(m.created_at)}</span>
        </div>
        <p class="msg-text">${escHtml(m.text)}</p>
        <div class="msg-footer">
          ${emojisArr.length ? '<span class="msg-emoji">' + emojisArr.join(' ') + '</span>' : ''}
          <button class="like-btn ${liked ? 'liked' : ''}" onclick="toggleLike(${m.id}, ${m.likes}, this)">
            ${liked ? '💕' : '🤍'} ${m.likes || 0}
          </button>
        </div>
      </div>`;
    }).join('');
  }

  async function toggleLike(id, currentLikes, btn) {
    const wasLiked = likedIds.has(id);
    const newLikes = wasLiked ? currentLikes - 1 : currentLikes + 1;

    if (wasLiked) {
      likedIds.delete(id);
    } else {
      likedIds.add(id);
    }
    saveLiked();

    btn.className = 'like-btn' + (likedIds.has(id) ? ' liked' : '');
    btn.innerHTML = (likedIds.has(id) ? '💕' : '🤍') + ' ' + newLikes;
    btn.onclick = () => toggleLike(id, newLikes, btn);

    try {
      await fetch(API + '?id=eq.' + id, {
        method: 'PATCH',
        headers: HEADERS,
        body: JSON.stringify({ likes: newLikes })
      });
    } catch(e) {}
  }

  async function submitMessage() {
    const name = document.getElementById('senderName').value.trim();
    const text = document.getElementById('msgText').value.trim();
    if (!text) { showError('메시지를 입력해주세요 💌'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '전송 중...';

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: HEADERS,
        body: JSON.stringify({
          name: name || '익명',
          text,
          emojis: selectedEmojis,
          likes: 0
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.message || 'error');
      }

      document.getElementById('senderName').value = '';
      document.getElementById('msgText').value = '';
      document.getElementById('charCount').textContent = '0 / 300';
      selectedEmojis = [];
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));

      showToast('✨ 메시지가 전달됐어요!');
      const msgs = await fetchMessages();
      renderMessages(msgs);
    } catch(e) {
      showError('전송에 실패했어요. 다시 시도해주세요 🌊');
    } finally {
      btn.disabled = false;
      btn.textContent = '메시지 보내기 ✉️';
    }
  }

  document.getElementById('emojiRow').addEventListener('click', e => {
    const btn = e.target.closest('.emoji-btn');
    if (!btn) return;
    const em = btn.dataset.emoji;
    if (btn.classList.contains('selected')) {
      btn.classList.remove('selected');
      selectedEmojis = selectedEmojis.filter(x => x !== em);
    } else {
      btn.classList.add('selected');
      selectedEmojis.push(em);
    }
  });

  document.getElementById('msgText').addEventListener('input', function() {
    document.getElementById('charCount').textContent = this.value.length + ' / 300';
  });

  function createStars() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 60; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2 + 1;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
      c.appendChild(s);
    }
  }

  function createBubbles() {
    const c = document.getElementById('bubbles');
    for (let i = 0; i < 18; i++) {
      const b = document.createElement('div');
      b.className = 'bubble';
      const sz = 8 + Math.random() * 30;
      b.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*10}s`;
      c.appendChild(b);
    }
  }

  async function init() {
    createStars();
    createBubbles();
    loadLiked();
    const msgs = await fetchMessages();
    renderMessages(msgs);

    setInterval(async () => {
      const msgs = await fetchMessages();
      if (msgs) renderMessages(msgs);
    }, 30000);
  }

  init();
</script>
</body>
</html>
